# Alibaba Qwen ASR + MT preset
# Requires QWEN_API_KEY in the environment or in a local config override.

runtime:
  mode: execute

asr:
  engine: qwen3-asr
  model: qwen3-asr-flash
  qwen_api_key: "${QWEN_API_KEY:}"
  qwen_base_url: "${QWEN_BASE_URL:https://dashscope-intl.aliyuncs.com/api/v1}"
  cuda: false

translation:
  engine: qwen-mt
  model: qwen2.5-7b-instruct-1m
  qwen_api_key: "${QWEN_API_KEY:}"
  qwen_base_url: "${QWEN_BASE_URL:https://dashscope-intl.aliyuncs.com/api/v1}"
  batch_size: 20

tts:
  engine: edge-tts
  voice_role: vi-VN-HoaiMyNeural

video_processing:
  burn_subtitle: true
  remove_hardcoded_sub: false
